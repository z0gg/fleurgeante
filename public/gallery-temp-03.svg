<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title>Photobooth</title>
  <desc>Décor immersif</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9f3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="petalA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f07b96"/>
    </radialGradient>
    <radialGradient id="petalB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#116b6d"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#33121f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <g opacity="0.2">
    <circle cx="1320" cy="220" r="180" fill="#f07b96"/>
    <circle cx="230" cy="1020" r="220" fill="#116b6d"/>
    <circle cx="1440" cy="920" r="120" fill="#ffffff"/>
  </g>
  <g transform="translate(820 585)" filter="url(#shadow)">
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(0) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(51) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(102) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(153) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(204) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(255) translate(0 -175)"/>
    <ellipse rx="170" ry="255" fill="url(#petalA)" transform="rotate(306) translate(0 -175)"/>
    <ellipse rx="165" ry="245" fill="url(#petalB)" transform="rotate(28) translate(0 -78)" opacity="0.96"/>
    <ellipse rx="165" ry="245" fill="url(#petalB)" transform="rotate(118) translate(0 -78)" opacity="0.82"/>
    <ellipse rx="165" ry="245" fill="url(#petalB)" transform="rotate(208) translate(0 -78)" opacity="0.9"/>
    <ellipse rx="165" ry="245" fill="url(#petalB)" transform="rotate(298) translate(0 -78)" opacity="0.84"/>
    <circle r="126" fill="#fffdfd"/>
    <circle r="64" fill="#f07b96" opacity="0.84"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#412936">
    <text x="96" y="118" font-size="36" letter-spacing="0.3em" opacity="0.65">APERÇU TEMPORAIRE</text>
    <text x="96" y="985" font-size="106" font-weight="700">Photobooth</text>
    <text x="96" y="1058" font-size="44" opacity="0.78">Décor immersif</text>
  </g>
</svg>
